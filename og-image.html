<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Image</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  .card {
    width: 1200px; height: 630px; background: #07070c;
    display: flex; flex-direction: column; justify-content: center;
    padding: 80px 100px; position: relative; overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
  }
  .grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black, transparent);
  }
  .blob1 {
    position: absolute; width: 500px; height: 500px; border-radius: 50%;
    background: #5b8cff; filter: blur(120px); opacity: .35;
    top: -150px; right: -80px;
  }
  .blob2 {
    position: absolute; width: 400px; height: 400px; border-radius: 50%;
    background: #a855f7; filter: blur(120px); opacity: .3;
    bottom: -120px; left: -60px;
  }
  .crop {
    position: absolute; width: 20px; height: 20px; opacity: .35;
  }
  .crop::before, .crop::after {
    content: ''; position: absolute; background: #5f5f74;
  }
  .crop::before { width: 100%; height: 1px; top: 50%; }
  .crop::after { height: 100%; width: 1px; left: 50%; }
  .crop.tl { top: 30px; left: 30px; }
  .crop.tr { top: 30px; right: 30px; }
  .crop.bl { bottom: 30px; left: 30px; }
  .crop.br { bottom: 30px; right: 30px; }
  .content { position: relative; z-index: 2; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    letter-spacing: .2em; color: #7ea0ff; margin-bottom: 24px;
    display: flex; align-items: center; gap: 10px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; background: #4ade80;
    box-shadow: 0 0 10px #4ade80;
  }
  .name {
    font-size: 88px; font-weight: 700; line-height: .95;
    letter-spacing: -.02em; color: #f4f4fa; margin-bottom: 20px;
  }
  .name em {
    font-style: normal;
    background: linear-gradient(135deg, #7ea0ff, #c084fc);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .role {
    font-family: 'JetBrains Mono', monospace; font-size: 18px;
    color: #9797ac; letter-spacing: .02em; margin-bottom: 30px;
  }
  .role .sep { color: #5f5f74; margin: 0 8px; }
  .stats {
    display: flex; gap: 40px;
  }
  .stat {
    display: flex; flex-direction: column;
  }
  .stat-num {
    font-size: 32px; font-weight: 700;
    background: linear-gradient(135deg, #7ea0ff, #c084fc);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #5f5f74; letter-spacing: .05em; margin-top: 4px;
  }
  .url {
    position: absolute; bottom: 40px; right: 60px;
    font-family: 'JetBrains Mono', monospace; font-size: 16px;
    color: #5f5f74; letter-spacing: .05em; z-index: 2;
  }
</style>
</head>
<body>
<div class="card">
  <div class="grid"></div>
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="crop tl"></div>
  <div class="crop tr"></div>
  <div class="crop bl"></div>
  <div class="crop br"></div>

  <div class="content">
    <div class="eyebrow"><span class="dot"></span> PORTFOLIO — NISCHAL ADHIKARI</div>
    <div class="name">Nischal<br><em>Adhikari</em></div>
    <div class="role">Graphic Designer <span class="sep">•</span> Visual Storyteller <span class="sep">•</span> Brand Designer</div>
    <div class="stats">
      <div class="stat"><span class="stat-num">1M+</span><span class="stat-label">VIEWS GENERATED</span></div>
      <div class="stat"><span class="stat-num">100+</span><span class="stat-label">PROJECTS</span></div>
      <div class="stat"><span class="stat-num">20+</span><span class="stat-label">CLIENTS</span></div>
    </div>
  </div>

  <div class="url">nischaladk.xyz</div>
</div>
</body>
</html>
